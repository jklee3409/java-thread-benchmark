spring:
  datasource:
    url: jdbc:mysql://localhost:13306/threadbench?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    username: threadbench
    password: threadbench
    hikari:
      maximum-pool-size: 10
      minimum-idle: 10
      connection-timeout: 2000
      pool-name: threadbenchPool
  data:
    redis:
      host: localhost
      port: 16379

external-api:
  base-url: http://localhost:18089

benchmark:
  environment: local-docker
