services:
  mysql:
    image: mysql:8.4
    container_name: threadbench-mysql
    environment:
      MYSQL_DATABASE: threadbench
      MYSQL_USER: threadbench
      MYSQL_PASSWORD: threadbench
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "13306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4
    container_name: threadbench-redis
    ports:
      - "16379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  wiremock:
    image: wiremock/wiremock:3.13.2
    container_name: threadbench-wiremock
    ports:
      - "18089:8080"
    volumes:
      - ./wiremock:/home/wiremock

  backend-platform:
    build:
      context: ../backend
    container_name: threadbench-backend-platform
    environment:
      SPRING_PROFILES_ACTIVE: local-docker,platform
      FRONTEND_ORIGIN: http://localhost:3000
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/threadbench?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
      SPRING_DATASOURCE_USERNAME: threadbench
      SPRING_DATASOURCE_PASSWORD: threadbench
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      EXTERNAL_API_BASE_URL: http://wiremock:8080
      BENCHMARK_EXECUTION_BASE_URL: http://127.0.0.1:8080
      BENCHMARK_EXECUTION_RESULTS_DIR: /app/results
    ports:
      - "8080:8080"
    volumes:
      - backend_platform_results:/app/results
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      wiremock:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12

  backend-virtual:
    build:
      context: ../backend
    container_name: threadbench-backend-virtual
    environment:
      SPRING_PROFILES_ACTIVE: local-docker,virtual
      FRONTEND_ORIGIN: http://localhost:3000
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/threadbench?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
      SPRING_DATASOURCE_USERNAME: threadbench
      SPRING_DATASOURCE_PASSWORD: threadbench
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      EXTERNAL_API_BASE_URL: http://wiremock:8080
      BENCHMARK_EXECUTION_BASE_URL: http://127.0.0.1:8081
      BENCHMARK_EXECUTION_RESULTS_DIR: /app/results
    ports:
      - "8081:8081"
    volumes:
      - backend_virtual_results:/app/results
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      wiremock:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/actuator/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12

  frontend:
    build:
      context: ../frontend
    container_name: threadbench-frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
      NEXT_PUBLIC_PLATFORM_API_BASE_URL: http://localhost:8080
      NEXT_PUBLIC_VIRTUAL_API_BASE_URL: http://localhost:8081
      NEXT_PUBLIC_GRAFANA_BASE_URL: http://localhost:13000
      NEXT_PUBLIC_PROMETHEUS_BASE_URL: http://localhost:19090
      NEXT_PUBLIC_WIREMOCK_BASE_URL: http://localhost:18089
    ports:
      - "3000:3000"
    depends_on:
      backend-platform:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    container_name: threadbench-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-lifecycle
    ports:
      - "19090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      backend-platform:
        condition: service_healthy
      backend-virtual:
        condition: service_healthy

  grafana:
    image: grafana/grafana:latest
    container_name: threadbench-grafana
    ports:
      - "13000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus

volumes:
  mysql_data:
  redis_data:
  grafana_data:
  backend_platform_results:
  backend_virtual_results:
