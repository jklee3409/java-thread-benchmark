global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: "thread-benchmark-platform"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["backend-platform:8080"]

  - job_name: "thread-benchmark-virtual"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["backend-virtual:8081"]
